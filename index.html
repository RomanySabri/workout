<html lang="ar" dir="rtl">

  <meta charset="UTF-8">
  <meta name="viewport"

  <title>خطة التدريب الرياضية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* CSS Reset and Variables - Gold Cinematic Theme */
    :root {
      --bg-main: #0a0a0a;
      --bg-grad: #0a0a0a;
      --bg-card: #111111;
      --gold-primary: #d4af37;
      --gold-light: #f3d060;
      --gold-dark: #b59023;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
      --border-color: rgba(212, 175, 55, 0.2);
      --danger: #ff4d4d;
      --success: #2ecc71;
      --info: #3498db;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-grad);
      min-height: 100vh;
      color: var(--text-main);
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gold-primary);
      border-radius: 4px;
    }

    /* Dashboard UI */
    .hdr {
      padding: 18px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(10px);
      background: rgba(10, 10, 10, 0.8);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border-color);
    }

    .hdr-l {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hdr-l .ic {
      width: 40px;
      height: 40px;
      background: var(--gold-primary);
      color: #ffffff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }

    .hdr-l h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-main);
    }

    .hdr-l h1 b {
      color: var(--gold-primary);
    }

    .hdr-l .sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hdr-a {
      display: flex;
      gap: 6px;
    }

    .bt {
      border: none;
      cursor: pointer;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
    }

    .bt-r {
      background: transparent;
      color: var(--gold-primary);
      border: 1px solid var(--gold-primary);
    }

    .bt-r:hover {
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
      background: rgba(212, 175, 55, 0.1);
    }

    .bt-g {
      background: var(--gold-primary);
      color: #ffffff;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
    }

    .bt-g:hover {
      box-shadow: 0 0 18px rgba(212, 175, 55, 0.6);
    }

    .bt-g:active {
      transform: scale(0.96);
    }

    .bt-g.ld {
      opacity: 0.6;
      pointer-events: none;
    }

    .tbar {
      padding: 0 14px;
      margin-bottom: 14px;
    }

    .tbar-in {
      display: flex;
      gap: 3px;
      padding: 3px;
      border-radius: 12px;
      background: #111111;
      border: 1px solid rgba(212, 175, 55, 0.15);
    }

    .tb {
      flex: 1;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #808080;
      padding: 8px 2px 6px;
      border-radius: 8px;
      font-family: 'Cairo';
      font-size: 12px;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .tb .ti {
      font-size: 20px;
    }

    .tb:hover {
      color: var(--text-main);
    }

    .tb.a {
      background: var(--gold-primary);
      color: #ffffff;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
    }

      padding: 0 14px 80px;

    .ca.days-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      pointer-events: none;
      z-index: 0;
    }
    .ca.days-bg .cc {
      position: relative;
      z-index: 1;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    .cc {
      background: #111111;
      border: 1px solid rgba(212, 175, 55, 0.2);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.05);
      border-radius: 12px;
      padding: 20px 16px;
      min-height: 50vh;
    }

    .st {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }

    .st h2 {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
    }

    .st .si {
      font-size: 22px;
      color: var(--gold-primary);
    }

    .fd {
      margin-bottom: 12px;
      margin-top: 12px;
    }

    .fd label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--gold-primary);
      margin-bottom: 4px;
    }

    .fd input,
    .fd select,
    .fd textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 8px;
      background: #0a0a0a;
      font-family: 'Cairo';
      font-size: 16px;
      color: #ffffff;
      outline: none;
      direction: rtl;
      transition: all 0.3s;
    }

    .fd input:focus,
    .fd textarea:focus,
    .fd select:focus {
      border-color: var(--gold-primary);
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.2);
    }

    .fd textarea {
      resize: none;
      line-height: 1.8;
    }

    .fd select option {
      background: #111111;
    }

    .fd input[type="date"],
    .fd input[type="number"] {
      direction: ltr;
      text-align: right;
    }

    .fd input[type="url"] {
      direction: ltr;
      text-align: left;
    }

    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .g3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .cs2 {
      grid-column: span 2;
    }

    /* Cards */
    .day-card {
      margin-bottom: 24px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px;
      padding: 16px;
      transition: transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .day-card:hover {
      border-color: var(--gold-primary);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 10px;
    }

    .day-badge {
      background: var(--gold-primary);
      color: #ffffff;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    .day-title-input {
      flex: 1;
    }

    .day-rm {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid #ff4d4d;
      cursor: pointer;
      background: transparent;
      color: #ff4d4d;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .day-rm:hover {
      background: #ff4d4d;
      color: #ffffff;
    }

    .day-sub {
      margin-bottom: 12px;
    }

    .ex-card {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 12px;
      padding: 12px 36px 12px 36px;
      margin-bottom: 10px;
      position: relative;
      transition: all 0.2s;
      backdrop-filter: blur(3px);
    }

    .ex-card:hover {
      border-color: rgba(212, 175, 55, 0.2);
    }

    .ex-num {
      position: absolute;
      top: 12px;
      right: 10px;
      width: 22px;
      height: 22px;
      background: var(--gold-primary);
      color: #ffffff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
    }

    .ex-rm {
      position: absolute;
      top: 12px;
      left: 10px;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid #ff4d4d;
      cursor: pointer;
      background: transparent;
      color: #ff4d4d;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .ex-rm:hover {
      background: #ff4d4d;
      color: #ffffff;
    }

    .ex-fields {
      padding-top: 2px;
    }

    .ex-link {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      background: rgba(255, 77, 77, 0.05);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px dashed rgba(255, 77, 77, 0.2);
    }

    .ex-link .yt-icon {
      font-size: 16px;
      color: var(--danger);
    }

    .add-btn {
      width: 100%;
      padding: 10px;
      border: 1px dashed var(--gold-primary);
      border-radius: 8px;
      background: transparent;
      color: var(--gold-primary);
      font-family: 'Cairo';
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: all 0.2s;
    }

    .add-btn:hover {
      background: rgba(212, 175, 55, 0.08);
    }

    .add-day {
      margin-top: 16px;
      padding: 14px;
      border: 2px dashed rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      background: transparent;
      color: var(--gold-primary);
      font-family: 'Cairo';
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all 0.3s;
    }

    .add-day:hover {
      border-color: var(--gold-primary);
      background: rgba(212, 175, 55, 0.05);
    }

    /* Coach Tab */
    .phu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .phc {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid var(--gold-primary);
      overflow: hidden;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;

    // بحث في قاعدة البيانات
    function searchExercises(query) {
      if (!query || query.length < 1) return [];
      const q = query.toLowerCase().trim();
      return EXERCISES_DB.filter(ex =>
        ex.ar.includes(q) || ex.en.toLowerCase().includes(q) || ex.group.includes(q)
      ).slice(0, 8);
    }

    // اختيار تمرين من الـ dropdown
    function selectExercise(di, ei, ar, en, yt) {
      S.days[di].exercises[ei].ar = ar;
      S.days[di].exercises[ei].en = en;
      if (yt) S.days[di].exercises[ei].yt = yt;
      const dd = document.getElementById(`dd_${di}_${ei}`);
      if (dd) dd.style.display = 'none';
      const arInput = document.getElementById(`ar_${di}_${ei}`);
      const enInput = document.getElementById(`en_${di}_${ei}`);
      const ytInput = document.getElementById(`yt_${di}_${ei}`);
      if (arInput) arInput.value = ar;
      if (enInput) enInput.value = en;
      if (ytInput && yt) { ytInput.value = yt; }
    }

    function onArInput(di, ei, val) {
      S.days[di].exercises[ei].ar = val;
      const results = searchExercises(val);
      const dd = document.getElementById(`dd_${di}_${ei}`);
      if (!dd) return;
      if (results.length > 0 && val.length > 0) {
        dd.innerHTML = results.map(ex =>
          `<div class="dd-item" onclick="selectExercise(${di},${ei},'${ex.ar.replace(/'/g,"\\'")}','${ex.en.replace(/'/g,"\\'")}','${(ex.yt||'').replace(/'/g,"\\'")}')">
            <span class="dd-ar">${ex.ar}</span>
            <span class="dd-en">${ex.en}</span>
            <span class="dd-group">${ex.group}</span>
            ${ex.yt ? '<span style="font-size:10px;color:#ff4d4d">▶ يوتيوب</span>' : ''}
          </div>`
        ).join('');
        dd.style.display = 'block';
      } else {
        dd.style.display = 'none';
      }
    }

    function closeAllDropdowns() {
      document.querySelectorAll('.ex-dropdown').forEach(d => d.style.display = 'none');
    }
    document.addEventListener('click', function(ev) {
      if (!ev.target.closest('.ex-search-wrap')) closeAllDropdowns();
    });
    function handlePhoto(inp) { const f = inp.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { coachPhoto = ev.target.result; R() }; r.readAsDataURL(f); }
    function TT(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    function totalEx() { let c = 0; S.days.forEach(d => c += d.exercises.length); return c; }

<body>
<div class="hd"><h1>سجل <b>تمارينك</b> 💪</h1><div class="cn" id="cn"></div></div>
<div class="dtabs" id="dtabs"></div>
<div class="wrap" id="content"></div>
<div class="bar">
  <button class="bb save" onclick="saveAll()">💾 حفظ</button>
  <button class="bb send" onclick="sendToCoach()">📤 ابعت للكابتن</button>
</div>
<div class="toast" id="toast"></div>
<script>
const PLAN = ${JSON.stringify(planData)};
let curDay = 0;
const todayKey = () => new Date().toISOString().slice(0,10);
const storeKey = di => 'wk_' + di;

function loadLog(di){ try{ return JSON.parse(localStorage.getItem(storeKey(di))) || {} }catch(e){ return {} } }
function saveLog(di, log){ localStorage.setItem(storeKey(di), JSON.stringify(log)); }

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

function render(){
  document.getElementById('cn').textContent = PLAN.client + ' | الكابتن: ' + PLAN.coach.name;
  document.getElementById('dtabs').innerHTML = PLAN.days.map((d,i)=>
    \`<button class="dtab \${i===curDay?'a':''}" onclick="curDay=\${i};render()">\${d.name}</button>\`).join('');
  const d = PLAN.days[curDay];
  const log = loadLog(curDay);
  const hist = log.history || [];
  const last = hist.length ? hist[hist.length-1] : null;
  document.getElementById('content').innerHTML = \`
    <div class="dh"><div class="t">\${d.title || d.name}</div><div class="s">\${d.sub || ''}</div></div>
    \${d.exercises.map((ex,ei)=>{
      const cur = (log.current && log.current[ei]) || [];
      const prevEx = last ? (last.data[ei]||[]) : [];
      const prevTxt = prevEx.filter(s=>s&&(s.w||s.r)).map((s,i)=>\`S\${i+1}: \${s.w||'-'}kg×\${s.r||'-'}\`).join(' · ');
      return \`<div class="exc">
        <div class="exh"><div class="exn"><div class="ar">\${ex.ar}</div><div class="en">\${ex.en}</div></div>
        <span class="ext">\${ex.sets} × \${ex.reps}</span></div>
        \${ex.yt?\`<a class="yt" href="\${ex.yt}" target="_blank">▶️ شاهد الفيديو</a>\`:''}
        <div class="shd"><span>Set</span><span>الوزن kg</span><span>التكرارات</span><span>✓</span></div>
        <div class="sets">
        \${Array.from({length:ex.sets}).map((_,si)=>{
          const s = cur[si]||{};
          return \`<div class="srow">
            <span class="sn">\${si+1}</span>
            <input class="si \${s.done?'done':''}" type="number" inputmode="decimal" placeholder="0" value="\${s.w||''}" onchange="upd(\${ei},\${si},'w',this.value)">
            <input class="si \${s.done?'done':''}" type="number" inputmode="numeric" placeholder="0" value="\${s.r||''}" onchange="upd(\${ei},\${si},'r',this.value)">
            <button class="chk \${s.done?'on':''}" onclick="tgl(\${ei},\${si})">✓</button>
          </div>\`;
        }).join('')}
        </div>
        \${prevTxt?\`<div class="prev">📊 آخر مرة: <b>\${prevTxt}</b></div>\`:''}
      </div>\`;
    }).join('')}\`;
}

function upd(ei,si,k,v){
  const log = loadLog(curDay);
  log.current = log.current || {};
  log.current[ei] = log.current[ei] || [];
  log.current[ei][si] = log.current[ei][si] || {};
  log.current[ei][si][k] = v;
  saveLog(curDay, log);
}
function tgl(ei,si){
  const log = loadLog(curDay);
  log.current = log.current || {};
  log.current[ei] = log.current[ei] || [];
  log.current[ei][si] = log.current[ei][si] || {};
  log.current[ei][si].done = !log.current[ei][si].done;
  saveLog(curDay, log);
  render();
}
function saveAll(){
  const log = loadLog(curDay);
  if(!log.current || !Object.keys(log.current).length){ toast('⚠️ سجل أوزانك الأول'); return; }
  log.history = log.history || [];
  log.history.push({ date: todayKey(), data: JSON.parse(JSON.stringify(log.current)) });
  if(log.history.length > 30) log.history.shift();
  log.current = {};
  saveLog(curDay, log);
  toast('✅ تم حفظ الجلسة!');
  render();
}
function sendToCoach(){
  const d = PLAN.days[curDay];
  const log = loadLog(curDay);
  const src = (log.current && Object.keys(log.current).length) ? log.current : (log.history && log.history.length ? log.history[log.history.length-1].data : null);
  if(!src){ toast('⚠️ مفيش بيانات مسجلة'); return; }
  let msg = '💪 *تسجيل تمارين - ' + PLAN.client + '*\\n📅 ' + todayKey() + '\\n🏋️ ' + (d.title||d.name) + '\\n\\n';
  d.exercises.forEach((ex,ei)=>{
    const sets = src[ei];
    if(!sets) return;
    const lines = sets.filter(s=>s&&(s.w||s.r)).map((s,i)=>'  S'+(i+1)+': '+(s.w||'-')+'kg × '+(s.r||'-'));
    if(lines.length) msg += '▪️ ' + ex.ar + '\\n' + lines.join('\\n') + '\\n';
  });
  let wa = PLAN.coach.wa.replace(/[^0-9]/g,'');
  if(wa && !wa.startsWith('2') && wa.length===11) wa = '2'+wa;
  window.open('https://wa.me/'+wa+'?text='+encodeURIComponent(msg),'_blank');
}
render();
<\/script>
</body>

        </div>
      </div>`).join('')}

      <button class="add-btn" onclick="addExercise(${di})">+ إضافة تمرين جديد</button>
    </div>`).join('')}

    <button class="add-day" onclick="addDay()">+ إضافة يوم تدريب جديد</button>`;
    }

    function bg() {
      if (coachPhoto) {
        return `<div class="pp-bg"></div>
            <div style="position:absolute;inset:0;background:url('${coachPhoto}') center top/cover no-repeat;opacity:0.25;filter:grayscale(100%);"></div>
            <div style="position:absolute;inset:0;background:linear-gradient(to bottom, rgba(10,10,10,0.4), #0a0a0a);opacity:0.6;"></div>
            <div class="pp-bdr"></div>`;
      }
      return '<div class="pp-bg"></div><div class="pp-pat"></div><div class="pp-bdr"></div>';
    }

    function ft(o) {
      const phIc = `<svg style="vertical-align:middle;margin-left:4px" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.82 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>`;
      const waIc = `<svg style="vertical-align:middle;margin-left:4px" width="14" height="14" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;
      const cPic = coachPhoto ? `<img src="${coachPhoto}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-left:10px;border:1px solid var(--gold-primary);box-shadow:0 0 5px rgba(212,175,55,0.3)">` : '';
      return `<div class="pp-ft" style="display:flex;align-items:center;justify-content:center;gap:5px;">${cPic} <span>${e(o.name)} | ${phIc} ${e(o.phone)} | ${waIc} ${e(o.wa)}</span></div>`;
    }

    async function GEN() {
      S.gen = true; R();
      try {
        const o = S.co, c = S.cl, box = document.getElementById('pdf-render');
        const ph = coachPhoto ? `<img src="${coachPhoto}">` : '<span style="font-size:50px;color:rgba(212,175,55,0.3)">👤</span>';

        const coverBg = coachPhoto
          ? `<div style="position:absolute;inset:0;background:url('${coachPhoto}') center top/cover no-repeat;"></div>
         <div style="position:absolute;inset:0;background:linear-gradient(to bottom, transparent 0%, rgba(10,10,10,0) 50%, rgba(10,10,10,0.6) 75%, #0a0a0a 100%);"></div>`
          : `<div style="position:absolute;inset:0;background:#0a0a0a;"></div>`;

        let html = `
    <!-- COVER -->
    <div class="pp" id="pp0">
      ${coverBg}
      <div class="pp-bdr"></div>
      <div class="pp-ct" style="padding-top: 30px; padding-bottom: 50px;">
        
        <div style="flex-grow: 1;"></div>
        <div class="pp-cname" style="flex-shrink:0;">${e(o.name)}</div>
        <div class="pp-csub" style="direction:ltr; display:flex; align-items:center; justify-content:center;flex-shrink:0;margin-top:6px;">
          ${e(o.cert)} <span style="margin:0 10px;color:#d4af37">|</span>
          <svg style="margin-right:4px;vertical-align:middle;" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.82 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg> ${e(o.phone)}
          <span style="margin:0 10px;color:#d4af37">|</span>
          <svg style="margin-right:4px;vertical-align:middle;" width="16" height="16" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> ${e(o.wa)}
        </div>

        <!-- Certificates on Cover -->
        <div style="width:85%;margin-top:15px;background:rgba(10,10,10,0.85);border:1px solid rgba(212,175,55,0.4);border-radius:12px;padding:12px 20px;flex-shrink:0;">
          <div class="pp-ctitle" style="margin-bottom:8px;font-size:14px;text-shadow:none">الشهادات والخبرات</div>
          ${L(o.certs).map(cVal => `<div class="cert-d" style="color:#ffffff;font-size:12px;line-height:1.6;margin-bottom:4px;font-weight:600">• ${e(cVal)}</div>`).join('')}
        </div>

        <div class="pp-ccard" style="margin-top:12px;padding:12px 30px;flex-shrink:0;">
          <div class="pp-ctitle" style="margin-bottom:12px;">بيانات المشترك</div>
          <div class="pp-cgrid" style="gap:10px 20px;">
            <div class="pp-citem" style="padding:4px 0"><span class="pp-cil">الاسم</span><span class="pp-civ">${e(c.name) || '—'}</span></div>
            <div class="pp-citem" style="padding:4px 0"><span class="pp-cil">العمر</span><span class="pp-civ">${c.age ? c.age + ' سنة' : '—'}</span></div>
            <div class="pp-citem" style="padding:4px 0"><span class="pp-cil">الطول</span><span class="pp-civ">${c.height ? c.height + ' سم' : '—'}</span></div>
            <div class="pp-citem" style="padding:4px 0"><span class="pp-cil">الوزن</span><span class="pp-civ">${c.weight || '—'} كجم</span></div>
            <div class="pp-citem" style="grid-column: span 2; padding:4px 0; border-top:1px solid rgba(212,175,55,0.1); margin-top:4px;"><span class="pp-cil">الهدف</span><span class="pp-civ">${e(c.goal)}</span></div>
          </div>
        </div>

        <div class="pp-mbar" style="margin-top:12px;flex-shrink:0;">
          <div class="pp-mb mb-p"><span class="pv2" style="font-size:22px;">${S.days.length}</span><span class="pl2">أيام التدريب</span></div>
          <div class="pp-mb mb-f"><span class="pv2" style="font-size:22px;">${totalEx()}</span><span class="pl2">تمارين مختلفة</span></div>
          <div class="pp-mb mb-c"><span class="pv2" style="font-size:22px;">100%</span><span class="pl2">التزام ونتائج</span></div>
        </div>
      </div>
    </div>`;

        // Day pages
        S.days.forEach((d, di) => {
          html += `<div class="pp" id="pp${di + 1}">${bg()}<div class="pp-ct">
        <div class="dp-hdr">
          <div class="dp-hdr-l"><h2>برنامج التدريب الاحترافي</h2><div class="dps">الكابتن: ${e(o.name)}</div></div>
          <div class="dp-hdr-r"><div class="dr-t">${e(d.name)}</div><div class="dr-s">${e(d.sub)}</div></div>
        </div>
        
        <div class="dp-ex-list">
        ${d.exercises.map((ex, ei) => `
        <div class="dp-ex">
          <div class="dp-ex-num">${String(ei + 1).padStart(2, '0')}</div>
          <div class="dp-ex-body">
            <div class="dp-ex-info">
              <div class="dp-ex-name-ar">${e(ex.ar)}</div>
              <div class="dp-ex-name-en">${e(ex.en)}</div>
              <div class="dp-ex-meta">
                <div class="dp-ex-tag sets"><span>مجموعات</span> ${e(ex.sets)}</div>
                <div class="dp-ex-tag reps"><span>تكرارات</span> ${e(ex.reps)}</div>
                <div class="dp-ex-tag rest"><span>راحة</span> ${e(ex.rest)}</div>
              </div>
            </div>
            ${ex.yt ? `
            <div class="dp-ex-media">
              <div class="yt-link-target" data-url="${e(ex.yt)}">
                <div class="yic">▶️</div>
                <div class="ylb">شاهد الفيديو</div>
              </div>
            </div>
            ` : '<div class="dp-ex-media" style="opacity:0.1;filter:grayscale(1)"><div class="yt-link-target"><div class="yic">📷</div><div class="ylb">لا يوجد فيديو</div></div></div>'}
          </div>
        </div>`).join('')}
        </div>
        
        <div class="pp-ft" style="display:flex;align-items:center;justify-content:space-between;width:100%;border-top:1px solid rgba(212,175,55,0.2);padding-top:10px;margin-top:auto;">
          <div style="display:flex;align-items:center;gap:8px;">
            ${coachPhoto ? `<img src="${coachPhoto}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--gold-primary);">` : ''}
            <span style="font-size:12px;color:#ffffff;font-weight:700;">${e(o.name)} | مدرب لياقة بدنية</span>
          </div>
          <span style="font-size:11px;color:#a0a0a0;">الصفحة ${di + 2} من ${S.days.length + 1}</span>
        </div>
      </div></div>`;
        });

        box.innerHTML = html;
        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 800));

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const totalPages = S.days.length + 1;

        for (let i = 0; i < totalPages; i++) {
          const el = document.getElementById('pp' + i);
          if (!el) continue;

          const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#0a0a0a', logging: false, width: 794, height: 1123, windowWidth: 794 });
          const img = canvas.toDataURL('image/jpeg', 0.95);

          if (i > 0) pdf.addPage();
          pdf.addImage(img, 'JPEG', 0, 0, 210, 297);

          // Add actual clickable links using DOM coordinates
          const links = el.querySelectorAll('.yt-link-target[data-url]');
          const elRect = el.getBoundingClientRect();

          links.forEach(link => {
            let url = link.getAttribute('data-url');
            if (url && !url.match(/^https?:\/\//i)) {
              url = 'https://' + url;
            }

            const rect = link.getBoundingClientRect();
            // Calculate coordinates relative to the page element
            const xPx = rect.left - elRect.left;
            const yPx = rect.top - elRect.top;

            // Convert from 794x1123 px to 210x297 mm
            const scaleX = 210 / 794;
            const scaleY = 297 / 1123;

            const x = xPx * scaleX;
            const y = yPx * scaleY;
            const w = rect.width * scaleX;
            const h = rect.height * scaleY;

            pdf.link(x, y, w, h, { url: url });
          });
        }

        pdf.save('Workout_Plan_' + (c.name || 'client').replace(/\s+/g, '_') + '.pdf');
        TT('✅ تم تحميل الـ PDF بنجاح!');
        box.innerHTML = '';
      } catch (err) { console.error(err); TT('❌ خطأ: ' + err.message); }
      S.gen = false; R();
    }

    R();
  </script>
</body>

</html>
