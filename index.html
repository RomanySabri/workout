<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <title>خطة التدريب الرياضية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* CSS Reset and Variables - Gold Cinematic Theme */
    :root {
      --bg-main: #0a0a0a;
      --bg-grad: #0a0a0a;
      --bg-card: #111111;
      --gold-primary: #d4af37;
      --gold-light: #f3d060;
      --gold-dark: #b59023;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
      --border-color: rgba(212, 175, 55, 0.2);
      --danger: #ff4d4d;
      --success: #2ecc71;
      --info: #3498db;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-grad);
      min-height: 100vh;
      color: var(--text-main);
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gold-primary);
      border-radius: 4px;
    }

    /* Dashboard UI */
    .hdr {
      padding: 18px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(10px);
      background: rgba(10, 10, 10, 0.8);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border-color);
    }

    .hdr-l {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hdr-l .ic {
      width: 40px;
      height: 40px;
      background: var(--gold-primary);
      color: #ffffff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }

    .hdr-l h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-main);
    }

    .hdr-l h1 b {
      color: var(--gold-primary);
    }

    .hdr-l .sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hdr-a {
      display: flex;
      gap: 6px;
    }

    .bt {
      border: none;
      cursor: pointer;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
    }

    .bt-r {
      background: transparent;
      color: var(--gold-primary);
      border: 1px solid var(--gold-primary);
    }

    .bt-r:hover {
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
      background: rgba(212, 175, 55, 0.1);
    }

    .bt-g {
      background: var(--gold-primary);
      color: #ffffff;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
    }

    .bt-g:hover {
      box-shadow: 0 0 18px rgba(212, 175, 55, 0.6);
    }

    .bt-g:active {
      transform: scale(0.96);
    }

    .bt-g.ld {
      opacity: 0.6;
      pointer-events: none;
    }

    .tbar {
      padding: 0 14px;
      margin-bottom: 14px;
    }

    .tbar-in {
      display: flex;
      gap: 3px;
      padding: 3px;
      border-radius: 12px;
      background: #111111;
      border: 1px solid rgba(212, 175, 55, 0.15);
    }

    .tb {
      flex: 1;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #808080;
      padding: 8px 2px 6px;
      border-radius: 8px;
      font-family: 'Cairo';
      font-size: 12px;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .tb .ti {
      font-size: 20px;
    }

    .tb:hover {
      color: var(--text-main);
    }

    .tb.a {
      background: var(--gold-primary);
      color: #ffffff;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
    }

    .ca {
      padding: 0 14px 80px;
    }

    .cc {
      background: #111111;
      border: 1px solid rgba(212, 175, 55, 0.2);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.05);
      border-radius: 12px;
      padding: 20px 16px;
      min-height: 50vh;
    }

    .st {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }

    .st h2 {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
    }

    .st .si {
      font-size: 22px;
      color: var(--gold-primary);
    }

    .fd {
      margin-bottom: 12px;
      margin-top: 12px;
    }

    .fd label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--gold-primary);
      margin-bottom: 4px;
    }

    .fd input,
    .fd select,
    .fd textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 8px;
      background: #0a0a0a;
      font-family: 'Cairo';
      font-size: 16px;
      color: #ffffff;
      outline: none;
      direction: rtl;
      transition: all 0.3s;
    }

    .fd input:focus,
    .fd textarea:focus,
    .fd select:focus {
      border-color: var(--gold-primary);
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.2);
    }

    .fd textarea {
      resize: none;
      line-height: 1.8;
    }

    .fd select option {
      background: #111111;
    }

    .fd input[type="date"],
    .fd input[type="number"] {
      direction: ltr;
      text-align: right;
    }

    .fd input[type="url"] {
      direction: ltr;
      text-align: left;
    }

    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .g3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .cs2 {
      grid-column: span 2;
    }

    /* Cards */
    .day-card {
      margin-bottom: 24px;
      background: rgba(212, 175, 55, 0.03);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 12px;
      padding: 16px;
      transition: transform 0.2s;
    }

    .day-card:hover {
      border-color: var(--gold-primary);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 10px;
    }

    .day-badge {
      background: var(--gold-primary);
      color: #ffffff;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    .day-title-input {
      flex: 1;
    }

    .day-rm {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid #ff4d4d;
      cursor: pointer;
      background: transparent;
      color: #ff4d4d;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .day-rm:hover {
      background: #ff4d4d;
      color: #ffffff;
    }

    .day-sub {
      margin-bottom: 12px;
    }

    .ex-card {
      background: #0a0a0a;
      border: 1px solid rgba(212, 175, 55, 0.08);
      border-radius: 12px;
      padding: 12px 36px 12px 36px;
      margin-bottom: 10px;
      position: relative;
      transition: all 0.2s;
    }

    .ex-card:hover {
      border-color: rgba(212, 175, 55, 0.2);
    }

    .ex-num {
      position: absolute;
      top: 12px;
      right: 10px;
      width: 22px;
      height: 22px;
      background: var(--gold-primary);
      color: #ffffff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
    }

    .ex-rm {
      position: absolute;
      top: 12px;
      left: 10px;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid #ff4d4d;
      cursor: pointer;
      background: transparent;
      color: #ff4d4d;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .ex-rm:hover {
      background: #ff4d4d;
      color: #ffffff;
    }

    .ex-fields {
      padding-top: 2px;
    }

    .ex-link {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      background: rgba(255, 77, 77, 0.05);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px dashed rgba(255, 77, 77, 0.2);
    }

    .ex-link .yt-icon {
      font-size: 16px;
      color: var(--danger);
    }

    .add-btn {
      width: 100%;
      padding: 10px;
      border: 1px dashed var(--gold-primary);
      border-radius: 8px;
      background: transparent;
      color: var(--gold-primary);
      font-family: 'Cairo';
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: all 0.2s;
    }

    .add-btn:hover {
      background: rgba(212, 175, 55, 0.08);
    }

    .add-day {
      margin-top: 16px;
      padding: 14px;
      border: 2px dashed rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      background: transparent;
      color: var(--gold-primary);
      font-family: 'Cairo';
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all 0.3s;
    }

    .add-day:hover {
      border-color: var(--gold-primary);
      background: rgba(212, 175, 55, 0.05);
    }

    /* Coach Tab */
    .phu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .phc {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid var(--gold-primary);
      overflow: hidden;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
    }

    .phc img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .phc .php {
      font-size: 28px;
    }

    .phc input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .phl {
      font-size: 13px;
      color: var(--gold-primary);
      font-weight: 600;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 10px;
      margin: 16px 0;
      justify-content: center;
    }

    .stat-box {
      flex: 1;
      padding: 12px 8px;
      border-radius: 8px;
      text-align: center;
      background: rgba(212, 175, 55, 0.03);
      border: 1px solid rgba(212, 175, 55, 0.15);
    }

    .stat-box .sv {
      font-size: 24px;
      font-weight: 900;
      color: var(--gold-primary);
      display: block;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-box .sl {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
    }

    /* Loader & Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #111111;
      color: var(--gold-primary);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid var(--gold-primary);
      z-index: 1000;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .sp {
      width: 12px;
      height: 12px;
      border: 2px solid #0a0a0a;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    .tc {
      animation: fu 0.25s ease;
    }

    @keyframes fu {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive Mobile Styles */
    @media (max-width: 768px) {
      .hdr {
        padding: 15px 15px 10px;
      }

      .hdr-l {
        width: 100%;
        justify-content: center;
        text-align: center;
      }

      .hdr-a {
        width: 100%;
      }

      .bt {
        width: 100%;
        justify-content: center;
        padding: 10px;
      }

      .ca {
        padding: 0 10px 80px;
      }

      .cc {
        padding: 20px 16px;
      }

      .g2,
      .g3 {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .day-card {
        padding: 14px;
      }

      .day-header {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        position: relative;
        padding-top: 30px;
      }

      .day-badge {
        align-self: flex-start;
      }

      .day-rm {
        position: absolute;
        left: 0;
        top: 0;
      }

      .ex-card {
        padding: 45px 10px 14px 10px;
      }

      .ex-num {
        top: 10px;
        right: 10px;
      }

      .ex-rm {
        top: 10px;
        left: 10px;
      }

      .ex-link {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      .toast {
        width: 90%;
        text-align: center;
      }
    }

    /* ========================================= */
    /* PDF TEMPLATE STYLES - GOLD CINEMATIC      */
    /* ========================================= */
    #pdf-render {
      position: absolute;
      left: -9999px;
      top: 0;
      width: 794px;
    }

    .pp {
      width: 794px;
      height: 1123px;
      position: relative;
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      background: #0a0a0a;
      color: #ffffff;
    }

    .pp-bg {
      position: absolute;
      inset: 0;
      background: #0a0a0a;
    }

    .pp-pat {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: linear-gradient(#d4af37 1px, transparent 1px), linear-gradient(90deg, #d4af37 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .pp-bdr {
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(212, 175, 55, 0.4);
      border-radius: 8px;
      pointer-events: none;
      z-index: 2;
    }

    .pp-ct {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 50px 60px;
      box-sizing: border-box;
    }

    .pp-ft {
      margin-top: auto;
      padding: 12px 0;
      text-align: center;
      font-size: 12px;
      color: #a0a0a0;
      width: 100%;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
    }

    /* Cover specific overrides */
    .pp-badge {
      background: #d4af37;
      color: #ffffff;
      padding: 8px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 4px;
      margin-bottom: 12px;
      z-index: 2;
      position: relative;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
      border: 1px solid #d4af37;
    }

    .pp-cname {
      font-size: 36px;
      font-weight: 900;
      color: #d4af37;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
      line-height: 1.2;
    }

    .pp-csub {
      font-size: 18px;
      color: #ffffff;
      font-weight: 700;
      margin-top: 6px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
    }

    .pp-ccard {
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid rgba(212, 175, 55, 0.4);
      border-radius: 8px;
      padding: 24px 30px;
      width: 85%;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
      position: relative;
    }

    .pp-ctitle {
      text-align: center;
      color: #d4af37;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .pp-cgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 30px;
    }

    .pp-citem {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .pp-cil {
      font-size: 13px;
      color: #d4af37;
      font-weight: 800;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .pp-civ {
      font-size: 20px;
      color: #ffffff;
      font-weight: 800;
      font-family: 'Cairo';
    }

    .pp-mbar {
      display: flex;
      gap: 16px;
      width: 85%;
      direction: ltr;
    }

    .pp-mb {
      flex: 1;
      padding: 14px 6px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid;
      background: rgba(10, 10, 10, 0.85);
    }

    .pp-mb .pv2 {
      font-size: 24px;
      font-weight: 900;
      display: block;
      margin-bottom: 4px;
      font-family: 'Cairo';
    }

    .pp-mb .pl2 {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: none;
    }

    .mb-c {
      border-color: #f39c12;
      color: #f39c12;
      box-shadow: 0 0 15px rgba(243, 156, 18, 0.15);
    }

    .mb-p {
      border-color: #d4af37;
      color: #d4af37;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
    }

    .mb-k {
      border-color: #2ecc71;
      color: #2ecc71;
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.15);
    }

    .mb-f {
      border-color: #ffffff;
      color: #ffffff;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
    }

    /* PDF Day Pages */
    .dp-hdr {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }

    .dp-hdr-l h2 {
      font-size: 20px;
      font-weight: 900;
      color: var(--gold-primary);
    }

    .dp-hdr-l .dps {
      font-size: 12px;
      color: #ffffff;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .dp-hdr-r {
      text-align: left;
    }

    .dp-hdr-r .dr-t {
      font-size: 24px;
      font-weight: 900;
      color: #ffffff;
    }

    .dp-hdr-r .dr-s {
      font-size: 12px;
      color: var(--gold-primary);
    }

    .dp-ex-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .dp-ex {
      display: flex;
      align-items: stretch;
      background: #111111;
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-right: 4px solid var(--gold-primary);
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
      direction: rtl;
    }

    .dp-ex-num {
      width: 50px;
      background: rgba(212, 175, 55, 0.1);
      color: var(--gold-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      border-left: 1px solid rgba(212, 175, 55, 0.15);
    }

    .dp-ex-body {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dp-ex-info {
      flex: 1;
    }

    .dp-ex-name-ar {
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .dp-ex-name-en {
      font-size: 13px;
      color: #a0a0a0;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .dp-ex-meta {
      display: flex;
      gap: 12px;
      direction: rtl;
    }

    .dp-ex-tag {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 6px;
    }

          <div class="pp-mb mb-p"><span class="pv2" style="font-size:22px;">${S.days.length}</span><span class="pl2">أيام التدريب</span></div>
          <div class="pp-mb mb-f"><span class="pv2" style="font-size:22px;">${totalEx()}</span><span class="pl2">تمارين مختلفة</span></div>
          <div class="pp-mb mb-c"><span class="pv2" style="font-size:22px;">100%</span><span class="pl2">التزام ونتائج</span></div>
        </div>
      </div>
    </div>`;

        // Day pages
        S.days.forEach((d, di) => {
          html += `<div class="pp" id="pp${di + 1}">${bg()}<div class="pp-ct">
        <div class="dp-hdr">
          <div class="dp-hdr-l"><h2>برنامج التدريب الاحترافي</h2><div class="dps">الكابتن: ${e(o.name)}</div></div>
          <div class="dp-hdr-r"><div class="dr-t">${e(d.name)}</div><div class="dr-s">${e(d.sub)}</div></div>
        </div>
        
        <div class="dp-ex-list">
        ${d.exercises.map((ex, ei) => `
        <div class="dp-ex">
          <div class="dp-ex-num">${String(ei + 1).padStart(2, '0')}</div>
          <div class="dp-ex-body">
            <div class="dp-ex-info">
              <div class="dp-ex-name-ar">${e(ex.ar)}</div>
              <div class="dp-ex-name-en">${e(ex.en)}</div>
              <div class="dp-ex-meta">
                <div class="dp-ex-tag sets"><span>مجموعات</span> ${e(ex.sets)}</div>
                <div class="dp-ex-tag reps"><span>تكرارات</span> ${e(ex.reps)}</div>
                <div class="dp-ex-tag rest"><span>راحة</span> ${e(ex.rest)}</div>
              </div>
            </div>
            ${ex.yt ? `
            <div class="dp-ex-media">
              <div class="yt-link-target" data-url="${e(ex.yt)}">
                <div class="yic">▶️</div>
                <div class="ylb">شاهد الفيديو</div>
              </div>
            </div>
            ` : '<div class="dp-ex-media" style="opacity:0.1;filter:grayscale(1)"><div class="yt-link-target"><div class="yic">📷</div><div class="ylb">لا يوجد فيديو</div></div></div>'}
          </div>
        </div>`).join('')}
        </div>
        
        <div class="pp-ft" style="display:flex;align-items:center;justify-content:space-between;width:100%;border-top:1px solid rgba(212,175,55,0.2);padding-top:10px;margin-top:auto;">
          <div style="display:flex;align-items:center;gap:8px;">
            ${coachPhoto ? `<img src="${coachPhoto}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--gold-primary);">` : ''}
            <span style="font-size:12px;color:#ffffff;font-weight:700;">${e(o.name)} | مدرب لياقة بدنية</span>
          </div>
          <span style="font-size:11px;color:#a0a0a0;">الصفحة ${di + 2} من ${S.days.length + 1}</span>
        </div>
      </div></div>`;
        });

        box.innerHTML = html;
        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 800));

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const totalPages = S.days.length + 1;

        for (let i = 0; i < totalPages; i++) {
          const el = document.getElementById('pp' + i);
          if (!el) continue;

          const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#0a0a0a', logging: false, width: 794, height: 1123, windowWidth: 794 });
          const img = canvas.toDataURL('image/jpeg', 0.95);

          if (i > 0) pdf.addPage();
          pdf.addImage(img, 'JPEG', 0, 0, 210, 297);

          // Add actual clickable links using DOM coordinates
          const links = el.querySelectorAll('.yt-link-target[data-url]');
          const elRect = el.getBoundingClientRect();

          links.forEach(link => {
            let url = link.getAttribute('data-url');
            if (url && !url.match(/^https?:\/\//i)) {
              url = 'https://' + url;
            }

            const rect = link.getBoundingClientRect();
            // Calculate coordinates relative to the page element
            const xPx = rect.left - elRect.left;
            const yPx = rect.top - elRect.top;

            // Convert from 794x1123 px to 210x297 mm
            const scaleX = 210 / 794;
            const scaleY = 297 / 1123;

            const x = xPx * scaleX;
            const y = yPx * scaleY;
            const w = rect.width * scaleX;
            const h = rect.height * scaleY;

            pdf.link(x, y, w, h, { url: url });
          });
        }

        pdf.save('Workout_Plan_' + (c.name || 'client').replace(/\s+/g, '_') + '.pdf');
        TT('✅ تم تحميل الـ PDF بنجاح!');
        box.innerHTML = '';
      } catch (err) { console.error(err); TT('❌ خطأ: ' + err.message); }
      S.gen = false; R();
    }

    R();
  </script>
</body>

</html>
